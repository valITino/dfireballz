services:
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    volumes:
      - ./orchestrator:/app
      - ./cases:/cases
      - ./evidence:/evidence
      - ./reports:/reports
      - ./playbooks:/app/playbooks:ro
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8800", "--reload"]
    environment:
      LOG_LEVEL: DEBUG

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
