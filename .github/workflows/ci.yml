name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          pip install -r orchestrator/requirements.txt

      - name: Python linting (ruff)
        run: |
          ruff check orchestrator/ mcp-servers/

      - name: Python type checking (mypy)
        run: |
          cd orchestrator && mypy . --ignore-missing-imports || true

      - name: Python unit tests
        run: |
          cd orchestrator && pytest tests/ -v --cov=. --cov-report=term-missing || true

      - name: Python security scan (Bandit)
        run: |
          bandit -r orchestrator/ mcp-servers/ -x orchestrator/tests/ -ll

      - name: Install UI dependencies
        run: |
          cd ui && npm ci

      - name: UI lint and type check
        run: |
          cd ui && npx tsc --noEmit || true

      - name: Build UI
        run: |
          cd ui && npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images (no push)
        run: |
          docker compose build --parallel

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"
