name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── DFIReballz Python Package ────────────────────────────────────────────
  package-lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dfireballz package with dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check dfireballz/ tests/

      - name: Type check (mypy)
        run: |
          mypy dfireballz/ --ignore-missing-imports

      - name: Unit tests
        run: |
          pytest tests/ -v --tb=short --cov=dfireballz --cov-report=term-missing

      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Security scan (Bandit)
        run: |
          pip install bandit
          bandit -r dfireballz/ -x tests/ -ll

  # ─── Orchestrator & MCP Servers ───────────────────────────────────────────
  orchestrator-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          pip install -r orchestrator/requirements.txt

      - name: Dependency vulnerability audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r orchestrator/requirements.txt

      - name: Python linting (ruff)
        run: |
          ruff check orchestrator/ mcp-servers/

      - name: Python type checking (mypy)
        run: |
          cd orchestrator && mypy . --ignore-missing-imports || true

      - name: Python unit tests
        run: |
          cd orchestrator && pytest tests/ -v --cov=. --cov-report=term-missing || true

      - name: Python security scan (Bandit)
        run: |
          bandit -r orchestrator/ mcp-servers/ -x orchestrator/tests/ -ll

      - name: Install UI dependencies
        run: |
          cd ui && npm ci

      - name: UI lint and type check
        run: |
          cd ui && npx tsc --noEmit || true

      - name: Build UI
        run: |
          cd ui && npm run build

  # ─── Docker Build Validation ──────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [package-lint-test, orchestrator-lint-test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate docker-compose.yml
        run: |
          docker compose config --quiet
          docker compose --profile claude-code config --quiet
          docker compose --profile openwebui config --quiet

      - name: Build Docker images (no push)
        run: |
          docker compose build --parallel
          docker compose --profile claude-code build claude-code

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"
