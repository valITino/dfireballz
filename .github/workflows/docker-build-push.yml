name: Build and Push Docker Images

on:
  # Auto-trigger: fires after CI workflow completes on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Auto-trigger: version tags bypass CI wait (tag push implies tested code)
  push:
    tags: ["v*"]

  # Manual trigger
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: crhacky/dfireballz

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: write
      packages: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: orchestrator
            context: ./orchestrator
            scout: false
          - service: ui
            context: ./ui
            scout: false
          - service: kali-forensics
            context: ./mcp-servers/kali-forensics
            scout: true
          - service: winforensics
            context: ./mcp-servers/winforensics
            scout: false
          - service: osint
            context: ./mcp-servers/osint
            scout: false
          - service: threat-intel
            context: ./mcp-servers/threat-intel
            scout: false
          - service: binary-analysis
            context: ./mcp-servers/binary-analysis
            scout: false
          - service: network-forensics
            context: ./mcp-servers/network-forensics
            scout: false
          - service: filesystem
            context: ./mcp-servers/filesystem
            scout: false
          - service: db
            context: ./database
            scout: false
          - service: claude-code
            context: .
            dockerfile: docker/claude-code.Dockerfile
            scout: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: false
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          max_attempts=5
          attempt=1
          backoff=3
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Docker login attempt ${attempt}/${max_attempts}..."
            if echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin 2>&1; then
              echo "Docker login succeeded on attempt ${attempt}"
              exit 0
            fi
            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Login failed, retrying in ${backoff}s..."
              sleep "$backoff"
              backoff=$((backoff * 2))
            fi
            attempt=$((attempt + 1))
          done
          echo "::error::Docker login failed after ${max_attempts} attempts"
          exit 1

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile || format('{0}/Dockerfile', matrix.context) }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.service }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Docker Scout - Vulnerability Scan
        uses: docker/scout-action@v1
        if: ${{ always() && matrix.scout }}
        with:
          command: cves
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.service }}
          sarif-file: sarif.output.json
          summary: true
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && matrix.scout }}
        with:
          sarif_file: sarif.output.json
        continue-on-error: true

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
