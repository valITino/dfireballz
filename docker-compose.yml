services:
  # ─── Core MCP Servers (always start) ─────────────────────────────

  kali-forensics:
    image: crhacky/dfireballz:kali-forensics
    build: ./mcp-servers/kali-forensics
    container_name: dfireballz-kali-forensics-1
    command: ["sleep", "infinity"]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      start_period: 30s
      start_interval: 3s
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./mcp-servers/kali-forensics/server.py:/app/server.py:ro
      - ./cases:/cases:ro
      - ./evidence:/evidence:ro
      - ./reports:/reports:ro
    networks:
      - dfireballz-net
    restart: unless-stopped

  winforensics:
    image: crhacky/dfireballz:winforensics
    build: ./mcp-servers/winforensics
    container_name: dfireballz-winforensics-1
    command: ["sleep", "infinity"]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      start_period: 15s
      start_interval: 3s
    volumes:
      - ./cases:/cases:ro
      - ./evidence:/evidence:ro
      - ./reports:/reports:ro
    networks:
      - dfireballz-net
    restart: unless-stopped

  osint:
    image: crhacky/dfireballz:osint
    build: ./mcp-servers/osint
    container_name: dfireballz-osint-1
    command: ["sleep", "infinity"]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      start_period: 15s
      start_interval: 3s
    environment:
      PYTHONUNBUFFERED: "1"
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
    volumes:
      - ./mcp-servers/osint/server.py:/app/server.py:ro
      - ./cases:/cases:ro
      - ./evidence:/evidence:ro
    networks:
      - dfireballz-net
    restart: unless-stopped

  threat-intel:
    image: crhacky/dfireballz:threat-intel
    build: ./mcp-servers/threat-intel
    container_name: dfireballz-threat-intel-1
    command: ["sleep", "infinity"]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      start_period: 15s
      start_interval: 3s
    environment:
      PYTHONUNBUFFERED: "1"
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      URLSCAN_API_KEY: ${URLSCAN_API_KEY:-}
      VULNCHECK_API_KEY: ${VULNCHECK_API_KEY:-}
    volumes:
      - ./mcp-servers/threat-intel/server.py:/app/server.py:ro
      - ./cases:/cases:ro
      - ./evidence:/evidence:ro
    networks:
      - dfireballz-net
    restart: unless-stopped

  binary-analysis:
    image: crhacky/dfireballz:binary-analysis
    build: ./mcp-servers/binary-analysis
    container_name: dfireballz-binary-analysis-1
    command: ["sleep", "infinity"]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      start_period: 15s
      start_interval: 3s
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./mcp-servers/binary-analysis/server.py:/app/server.py:ro
      - ./cases:/cases:ro
      - ./evidence:/evidence:ro
    networks:
      - dfireballz-net
    restart: unless-stopped

  network-forensics:
    image: crhacky/dfireballz:network-forensics
    build: ./mcp-servers/network-forensics
    container_name: dfireballz-network-forensics-1
    command: ["sleep", "infinity"]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      start_period: 15s
      start_interval: 3s
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./mcp-servers/network-forensics/server.py:/app/server.py:ro
      - ./cases:/cases:ro
      - ./evidence:/evidence:ro
      - ./reports:/reports:ro
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      - dfireballz-net
    restart: unless-stopped

  filesystem:
    image: crhacky/dfireballz:filesystem
    build: ./mcp-servers/filesystem
    container_name: dfireballz-filesystem-1
    command: ["sleep", "infinity"]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      start_period: 10s
      start_interval: 2s
    volumes:
      - ./cases:/cases
      - ./evidence:/evidence:ro
      - ./reports:/reports
    networks:
      - dfireballz-net
    restart: unless-stopped

  # ─── Core Infrastructure (always start) ──────────────────────────

  db:
    image: crhacky/dfireballz:db
    build: ./database
    container_name: dfireballz-db-1
    security_opt:
      - no-new-privileges:true
    healthcheck:
      start_period: 10s
      start_interval: 2s
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dfireballz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_run_make_setup}
      POSTGRES_DB: ${POSTGRES_DB:-dfireballz}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - dfireballz-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dfireballz-redis-1
    security_opt:
      - no-new-privileges:true
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - dfireballz-net
    restart: unless-stopped

  orchestrator:
    image: crhacky/dfireballz:orchestrator
    build: ./orchestrator
    container_name: dfireballz-orchestrator-1
    security_opt:
      - no-new-privileges:true
    healthcheck:
      start_period: 15s
      start_interval: 3s
    ports:
      - "8800:8800"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dfireballz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_run_make_setup}
      POSTGRES_DB: ${POSTGRES_DB:-dfireballz}
      DATABASE_URL: postgresql://${POSTGRES_USER:-dfireballz}:${POSTGRES_PASSWORD:-changeme_run_make_setup}@db:5432/${POSTGRES_DB:-dfireballz}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme}
      MCP_HOST: ${MCP_HOST:-claude-code}
    volumes:
      - ./cases:/cases
      - ./evidence:/evidence
      - ./reports:/reports
      - ./playbooks:/app/playbooks:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    group_add:
      - "${DOCKER_GID:-999}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dfireballz-net
    restart: unless-stopped

  # ─── Claude Code Container (--profile claude-code) ──────────────

  claude-code:
    image: crhacky/dfireballz:claude-code
    build:
      context: .
      dockerfile: docker/claude-code.Dockerfile
    container_name: dfireballz-claude-code-1
    profiles:
      - claude-code
    stdin_open: true
    tty: true
    stop_grace_period: 5s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    environment:
      # Optional: leave empty to use interactive account login (recommended).
      # Set in .env or export to use API key auth instead.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      HOME: /home/claude
      DFIREBALLZ_CONTAINER: "1"
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
      NODE_OPTIONS: "--max-old-space-size=4096"
      # Prevent proxy interference with internal Docker DNS names
      no_proxy: "kali-forensics,winforensics,osint,threat-intel,binary-analysis,network-forensics,filesystem,db,redis,orchestrator,ollama,mcpo,open-webui,localhost,127.0.0.1"
      NO_PROXY: "kali-forensics,winforensics,osint,threat-intel,binary-analysis,network-forensics,filesystem,db,redis,orchestrator,ollama,mcpo,open-webui,localhost,127.0.0.1"
    extra_hosts:
      # Block access to host services via Docker bridge (tintinweb pattern)
      - "host.docker.internal:127.0.0.1"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    tmpfs:
      - /tmp:noexec,nosuid,size=512m
    volumes:
      - ./cases:/cases
      - ./evidence:/evidence:ro
      - ./reports:/reports
      - ./results:/results
      - ./CLAUDE.md:/workspace/CLAUDE.md:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persist Claude Code auth/config across container restarts
      - claude-config:/home/claude/.claude
    group_add:
      - "${DOCKER_GID:-999}"
    depends_on:
      kali-forensics:
        condition: service_healthy
      winforensics:
        condition: service_healthy
      osint:
        condition: service_healthy
      threat-intel:
        condition: service_healthy
      binary-analysis:
        condition: service_healthy
      network-forensics:
        condition: service_healthy
      filesystem:
        condition: service_healthy
    networks:
      - dfireballz-net

  # ─── Open WebUI Scenario (--profile openwebui) ──────────────────

  ollama:
    image: ollama/ollama:latest
    container_name: dfireballz-ollama-1
    profiles:
      - openwebui
    security_opt:
      - no-new-privileges:true
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - dfireballz-net
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: dfireballz-open-webui-1
    profiles:
      - openwebui
    security_opt:
      - no-new-privileges:true
    ports:
      - "8080:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-changeme}
    depends_on:
      - ollama
    networks:
      - dfireballz-net
    restart: unless-stopped

  mcpo:
    image: ghcr.io/open-webui/mcpo:main
    container_name: dfireballz-mcpo-1
    profiles:
      - openwebui
    security_opt:
      - no-new-privileges:true
    ports:
      - "8812:8000"
    volumes:
      - ./config/mcpo.json:/app/config.json:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    group_add:
      - "${DOCKER_GID:-999}"
    command: ["mcpo", "--config", "/app/config.json", "--api-key", "${MCPO_API_KEY:-changeme}"]
    networks:
      - dfireballz-net
    restart: unless-stopped

networks:
  dfireballz-net:
    driver: bridge

volumes:
  db-data:
  redis-data:
  ollama-data:
  claude-config:
